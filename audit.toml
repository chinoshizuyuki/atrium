# cargo-audit configuration
# Unmaintained crate warnings: these are transitive dependencies we cannot directly update.
# They are informational only (no known vulnerabilities), so we ignore them in CI.

[advisories]
# The following unmaintained advisories are acknowledged and ignored.
# They are transitive deps (not direct) with no known security vulnerabilities,
# only "unmaintained" status warnings.

ignore = [
    # bincode 1.3.3 — unmaintained, used by atrium-memory (sled transitive)
    # No known vulnerabilities, just unmaintained. Replacement (bincode 2.x) is API-incompatible.
    "RUSTSEC-2024-0399",

    # fxhash — unmaintained, transitive via sled
    # No known vulnerabilities. Used for fast hashing in sled's internal B-tree.
    "RUSTSEC-2023-0048",

    # instant — unmaintained, transitive via sled (wasm32 fallback)
    # No known vulnerabilities. Only relevant on wasm32 target; unused on native builds.
    "RUSTSEC-2024-0014",

    # number_prefix — unmaintained, transitive via indicatif → console
    # No known vulnerabilities. Pure formatting crate.
    "RUSTSEC-2024-0023",

    # paste — unmaintained (proc-macro helper), transitive via various crates
    # No known vulnerabilities. Widely used in ecosystem; migration to proc-macro2-derive ongoing.
    "RUSTSEC-2024-0040",
]

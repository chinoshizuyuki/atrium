# Atrium — Production Stack
# 启动: docker compose up -d
# 更新: docker compose build --no-cache && docker compose up -d
# 日志: docker compose logs -f atrium-core
# 监控: http://localhost:3000 (Grafana) / http://localhost:9090 (Prometheus)

services:
  # ─── Rust Core Engine (含原生 HTTP/SSE Gateway) ─────────────
  atrium-core:
    build: .
    image: atrium-core:latest
    container_name: atrium-core
    restart: unless-stopped
    ports:
      - "8080:8080"     # HTTP/SSE Gateway (取代 Python Gateway)
      - "50051:50051"   # gRPC (向后兼容)
      - "9090:9090"     # Prometheus metrics
    volumes:
      - atrium_data:/data/atrium
      - ./atrium.toml:/etc/atrium/atrium.toml:ro
    environment:
      - RUST_LOG=info
      - ATRIUM_DATA_DIR=/data/atrium
      - TZ=${TZ:-Asia/Shanghai}
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '2.0'
        reservations:
          memory: 512M
    healthcheck:
      test: ["CMD", "atrium-core", "/etc/atrium/atrium.toml", "--health"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

  # ─── QQ Bot Adapter (感官器官 — IM 接入) ──────────────────────
  # 数字生命的 QQ 感官器官 — 将 QQ 消息流接入 Core 意识
  # Digital life's QQ sensory organ — bridges QQ messages into Core consciousness
  #
  # 双模式 / Dual-mode:
  #   Mode A (默认): OneBot v11 — go-cqhttp/NapCat 反向 WS 接入
  #   Mode B:        Tencent Official Bot — q.qq.com 正向 WS 接入
  #
  # 启动 / Start:
  #   OneBot 模式:   docker compose up -d atrium-qq-adapter
  #   Tencent 模式:  QQ_BOT_MODE=tencent QQ_BOT_APP_ID=xxx QQ_BOT_TOKEN=xxx \
  #                 docker compose up -d atrium-qq-adapter
  atrium-qq-adapter:
    build:
      context: .
      dockerfile: services/gateway/Dockerfile.qq
    image: atrium-qq-adapter:latest
    container_name: atrium-qq-adapter
    restart: unless-stopped
    ports:
      - "${ONEBOT_PORT:-8088}:8088"   # OneBot v11 反向 WS 端口 / Reverse-WS port
    environment:
      # ── Core 连接 / Core connection ──
      - ATRIUM_GATEWAY=http://atrium-core:8080
      - ATRIUM_ROOM=${ATRIUM_ROOM:-qq-bridge}
      - ATRIUM_NAME=${ATRIUM_NAME:-Atrium}
      - ATRIUM_INSTANCE=${ATRIUM_INSTANCE:-qq-adapter}
      # ── 行为配置 / Behavior config ──
      - RESPOND_AT_ONLY=${RESPOND_AT_ONLY:-true}
      - MAX_REPLY_CHARS=${MAX_REPLY_CHARS:-300}
      - RATE_LIMIT_SECS=${RATE_LIMIT_SECS:-2.0}
      # ── OneBot v11 模式 / OneBot v11 mode ──
      - QQ_BOT_MODE=${QQ_BOT_MODE:-onebot}
      - ONEBOT_HOST=0.0.0.0
      - ONEBOT_PORT=8088
      - BOT_QQ=${BOT_QQ:-}
      # ── Tencent Official Bot 模式 / Tencent Official Bot mode ──
      - QQ_BOT_APP_ID=${QQ_BOT_APP_ID:-}
      - QQ_BOT_TOKEN=${QQ_BOT_TOKEN:-}
      - QQ_BOT_SECRET=${QQ_BOT_SECRET:-}
      - QQ_BOT_SANDBOX=${QQ_BOT_SANDBOX:-false}
      # ── 通用 / General ──
      - TZ=${TZ:-Asia/Shanghai}
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.3'
        reservations:
          memory: 32M
    depends_on:
      atrium-core:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8088/ >/dev/null 2>&1 || pgrep -f qq_adapter.py >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

  # ─── Prometheus ─────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: atrium-prometheus
    restart: unless-stopped
    ports:
      - "9091:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=30d'
      - '--storage.tsdb.retention.size=512MB'
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          memory: 128M
    depends_on:
      atrium-core:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9090/-/healthy || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 15s
      retries: 3

  # ─── Grafana ────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:11.0.0
    container_name: atrium-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-atrium}
      - GF_AUTH_ANONYMOUS_ENABLED=false
      - GF_USERS_ALLOW_SIGN_UP=false
      - TZ=${TZ:-Asia/Shanghai}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
        reservations:
          memory: 64M
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 20s
      retries: 3

volumes:
  atrium_data:
  prometheus_data:
  grafana_data:

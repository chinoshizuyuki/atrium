// Atrium gRPC 协议定义 / Atrium gRPC Protocol Definition
// 定义 Rust 核心与 Python Gateway / 外部客户端之间的通信契约。
// Defines the communication contract between Rust core and Python Gateway / external clients.

syntax = "proto3";
package atrium;

// ========== 核心服务 / Core Service ==========
service AtriumCore {
  // 处理用户消息 / Process a user message
  rpc ProcessMessage(ProcessMessageRequest) returns (ProcessMessageResponse);
  // 获取当前情绪状态 / Get current emotion state
  rpc GetEmotion(GetEmotionRequest) returns (EmotionState);
  // 搜索记忆 / Search memory
  rpc SearchMemory(SearchMemoryRequest) returns (SearchMemoryResponse);
  // 搜索罐装知识 / Search canned knowledge
  rpc SearchCanned(SearchCannedRequest) returns (SearchCannedResponse);
  // 导入罐装知识 / Import canned knowledge
  rpc ImportCanned(ImportCannedRequest) returns (ImportCannedResponse);
  // 健康检查 / Health check
  rpc HealthCheck(HealthCheckRequest) returns (HealthCheckResponse);
  // 流式处理用户消息 / Stream-process a user message（Rust 核心直接流式输出）
  rpc ProcessMessageStream(ProcessMessageRequest) returns (stream ProcessMessageChunk);
  // 上传文件 / Upload a file
  rpc UploadFile(UploadFileRequest) returns (UploadFileResponse);
}

// ========== ProcessMessage / 处理消息 ==========
message ProcessMessageRequest {
  string message = 1;    // 用户消息文本 / User message text
  string channel = 2;    // 渠道标识 / Channel identifier
  string user_id = 3;    // 用户 ID / User identifier
  string session_id = 4; // 会话 ID / Session identifier
}
message ProcessMessageResponse {
  string reply = 1;            // AI 回复 / AI reply text
  string emotion = 2;          // 情绪标签 / Emotion label
  repeated string actions = 3; // 触发动作 / Triggered actions
  ExpressionMetadata expression = 5; // 表达元数据 / Expression metadata (kinesics + prosody + self-care)
}

// ========== ProcessMessageStream（Rust-native streaming） ==========
message ProcessMessageChunk {
  string token = 1;              // 流式 Token（空=元数据/结束帧） / Stream token (empty=metadata/end)
  string emotion = 2;            // 当前情感标签 / Current emotion label
  bool done = 3;                 // 流结束标记 / End-of-stream marker
  map<string, string> meta = 4;  // 元数据 / Metadata (model, context_tokens, etc.)
  ExpressionMetadata expression = 5; // 表达元数据 / Expression metadata (kinesics + prosody + self-care)
}

// ========== GetEmotion / 获取情绪状态 ==========
message GetEmotionRequest {}      // 空，可扩展 / Empty, extensible

message EmotionState {
  float pleasure = 1;   // 愉悦度 [-1, 1] / Pleasure
  float arousal = 2;    // 唤醒度 [-1, 1] / Arousal
  float dominance = 3;  // 支配度 [-1, 1] / Dominance
}

// ========== SearchMemory / 搜索记忆 ==========
message SearchMemoryRequest {
  string query = 1;  // 搜索关键词 / Search query
  uint32 limit = 2;  // 结果数量限制 / Max results
}
message SearchMemoryResult {
  string id = 1;
  string content = 2;
  int64 timestamp_ms = 3;
  EmotionState emotion = 4;
  float importance = 5;
  string kind = 6;
}
message SearchMemoryResponse {
  repeated SearchMemoryResult results = 1;
}

// ========== SearchCanned / 搜索罐装知识 ==========
message SearchCannedRequest {
  string query = 1;
  repeated string tags = 2;
  uint32 limit = 3;
}
message CannedResult {
  string name = 1;
  string title = 2;
  string kind = 3;
  repeated string tags = 4;
  string summary = 5;
  string body = 6;
  string version = 7;
  string trigger_type = 8;
}
message SearchCannedResponse {
  repeated CannedResult results = 1;
  uint32 total = 2;
}

// ========== ImportCanned / 导入罐装知识 ==========
message ImportCannedRequest {
  string text = 1;  // 跨 AI 传输文本 / Cross-AI transfer text
}
message ImportCannedResponse {
  uint32 imported = 1;
  repeated string names = 2;
  string error = 3;
}

// ========== ExpressionMetadata / 表达元数据 ==========
// Issue-2: 与 Rust protocol.rs 结构体完全同步 / Fully synced with Rust protocol.rs structs
// D1-D3 Mapper 输出的统一协议结构 / Unified protocol structure for D1-D3 Mapper outputs
message ExpressionMetadata {
  ProsodyMeta prosody = 1;    // 韵律参数 / Prosody params (SSML compatible)
  KinesicsMeta kinesics = 2;  // 体态参数 / Kinesics params (animation commands)
  TimingMeta timing = 3;      // 节奏参数 / Timing params (reply rhythm control)
}

/// 韵律元数据 — 供 TTS 引擎使用 / Prosody metadata for TTS engine
message ProsodyMeta {
  float pitch_offset = 1;      // 基频偏移（半音）/ Pitch offset (semitones)
  float rate = 2;              // 语速因子（1.0=正常）/ Speech rate factor
  float energy = 3;            // 能量因子（1.0=正常）/ Energy factor
  float pause_duration_ms = 4; // 句间停顿（ms）/ Inter-sentence pause
  float warmth = 5;            // 音色温暖度 [0,1] / Vocal warmth
  string ssml_attrs = 6;       // SSML 属性字符串 / SSML attributes string
}

/// 体态元数据 — 供渲染引擎动画使用 / Kinesics metadata for rendering engine
message KinesicsMeta {
  float head_tilt = 1;          // 头部倾斜角度 / Head tilt angle
  float shoulder_openness = 2;  // 肩膀展开度 [0,1] / Shoulder openness
  float lean = 3;               // 前倾/后仰 [-0.5,0.5] / Body lean
  float eye_contact = 4;        // 眼神接触强度 [0,1] / Eye contact intensity
  float gesture_activity = 5;   // 手势活跃度 [0,1] / Gesture activity
  float breath_rate = 6;        // 呼吸频率因子 / Breath rate factor
  string animation_commands = 7; // 动画指令 JSON / Animation commands JSON
}

/// 节奏元数据 — 供回复调度使用 / Timing metadata for reply scheduling
message TimingMeta {
  float typing_delay_factor = 1;     // 打字延迟因子（1.0=正常）/ Typing delay factor
  float inter_sentence_pause_ms = 2; // 句间停顿（ms）/ Inter-sentence pause
  float hesitation_prob = 3;         // 犹豫概率 [0,1] / Hesitation probability
  float segmented_send_prob = 4;     // 分段发送概率 [0,1] / Segmented send probability
  float urgency = 5;                 // 紧迫感 [0,1] / Urgency level
}

// ========== HealthCheck / 健康检查 ==========
message HealthCheckRequest {
  uint64 event_count = 1;
  // 房间消息（JSON 数组，Python 网关推送） / Room messages (JSON array, pushed by Python gateway)
  string room_incoming_json = 2;
}
message HealthCheckResponse {
  bool ok = 1;
  uint64 event_count = 2;
  uint64 uptime_seconds = 3;
  map<string, string> module_states = 4; // 各模块状态 / Per-module status
}

// ========== UploadFile / 文件上传 ==========
// 数字生命的工具记忆入口 — 用户上传文件成为可检索的知识载体
// Tool memory entry of digital life — uploaded files become searchable knowledge
message UploadFileRequest {
  string filename = 1;    // 原始文件名 / Original filename
  string mime_type = 2;   // MIME 类型 / MIME type
  bytes  data = 3;        // 文件二进制数据 / File binary data
  string session_id = 4;  // 会话 ID / Session identifier
}
message UploadFileResponse {
  string hash = 1;           // 文件哈希 (SHA256) / File hash
  string original_name = 2;  // 原始文件名 / Original filename
  uint64 size = 3;           // 文件大小 (bytes) / File size
  bool   text_extracted = 4; // 是否已提取文本 / Text extracted flag
  string extracted_text = 5; // 提取的文本（截断 4096）/ Extracted text
  string error = 6;          // 错误信息（空=成功）/ Error message
}

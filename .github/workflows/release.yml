# Atrium Release — Build binaries + create GitHub Release
# Triggered by pushing a version tag (v*).

name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            suffix: ""
            cross: false
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            suffix: ""
            cross: true
          - os: macos-latest
            target: x86_64-apple-darwin
            suffix: ""
            cross: false
          - os: macos-latest
            target: aarch64-apple-darwin
            suffix: ""
            cross: false
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            suffix: ".exe"
            cross: false
    steps:
      - uses: actions/checkout@v4

      - name: Install protoc (macOS)
        if: runner.os == 'macOS'
        run: brew install protobuf

      - name: Install protoc (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $v = "28.3"
          Invoke-WebRequest -Uri "https://github.com/protocolbuffers/protobuf/releases/download/v${v}/protoc-${v}-win64.zip" -OutFile protoc.zip
          Expand-Archive protoc.zip -DestinationPath "$env:USERPROFILE\protoc"
          echo "$env:USERPROFILE\protoc\bin" >> $env:GITHUB_PATH

      - name: Install system deps (Linux x86_64)
        if: runner.os == 'Linux' && !matrix.cross
        run: sudo apt-get update && sudo apt-get install -y libsqlite3-dev protobuf-compiler

      - name: Install cross for ARM64 Linux
        if: matrix.cross
        run: cargo install cross --locked

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - name: Build release binary (native)
        if: '!matrix.cross'
        run: cargo build --release --target ${{ matrix.target }} -p atrium-core

      - name: Build release binary (cross)
        if: matrix.cross
        run: cross build --release --target ${{ matrix.target }} -p atrium-core

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: atrium-core-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/atrium-core${{ matrix.suffix }}

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release
          for dir in artifacts/*/; do
            target=$(basename "$dir")
            binary=$(find "$dir" -name 'atrium-core*' -type f | head -1)
            if [ -n "$binary" ]; then
              ext=""
              [[ "$target" == *"windows"* ]] && ext=".exe"
              cp "$binary" "release/atrium-core-${target}${ext}"
              chmod +x "release/atrium-core-${target}${ext}" 2>/dev/null || true
            fi
          done

      - name: Generate SHA256 checksums
        run: |
          cd release
          sha256sum * > checksums-sha256.txt
          echo "Checksums:"
          cat checksums-sha256.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}

# Atrium CI — Rust (全 Rust 架构)
# Runs on every push/PR to main.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  rust:
    name: Rust (fmt + clippy + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler libsqlite3-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          components: rustfmt, clippy

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: atrium-stable

      - name: cargo fmt
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --workspace -- -D warnings

      - name: cargo check
        run: cargo check --workspace

      - name: Security audit
        run: |
          cargo install cargo-audit@0.22.2 --locked
          # 忽略不可修复的 unmaintained 警告 / Ignore unfixable unmaintained warnings
          # bincode 1.3.3: 2.x 为不兼容重写，迁移成本高 / 2.x is incompatible rewrite
          # fxhash/instant: sled 0.34 传递依赖，等待 sled 0.35+ / sled transitive
          # number_prefix/paste: Cargo.lock 残留，已不在依赖树中 / Cargo.lock residue
          cargo audit \
            --ignore RUSTSEC-2025-0141 \
            --ignore RUSTSEC-2025-0057 \
            --ignore RUSTSEC-2024-0384 \
            --ignore RUSTSEC-2025-0119 \
            --ignore RUSTSEC-2024-0436

      - name: cargo test
        run: cargo test --workspace -- --test-threads=1
